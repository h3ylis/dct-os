version: 2
updates:
  # Keep GitHub Actions SHA-pins current. Dependabot understands the
  # "@<sha> # vX.Y.Z" form and bumps both the pin and the comment together,
  # so pinning to a SHA does not mean going stale.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    groups:
      actions:
        patterns: ["*"]

  # Python runtime + dev dependencies (flask, openpyxl, pytest).
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"

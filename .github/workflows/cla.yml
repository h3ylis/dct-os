name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@ca4a40a7d1004f18d9960b404b97e5f30a505a08 # v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/h3ylis/dct-os/blob/master/CLA.md"
          branch: "cla-signatures"
          allowlist: "h3ylis,dependabot[bot],github-actions[bot]"
          custom-notsigned-prcomment: >
            Thanks for the contribution! Before we can merge, we need you to sign
            our [Contributor License Agreement](https://github.com/h3ylis/dct-os/blob/master/CLA.md).
            It's a one-time step — just post the comment below.
          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
          custom-allsigned-prcomment: "All contributors have signed the CLA ✅"

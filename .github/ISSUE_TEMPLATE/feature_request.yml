name: Feature request
description: Suggest an idea or improvement for DCT-OS
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Tell us the problem you're trying to solve first — that helps us find the best fix, not just the one you had in mind.
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: The workflow or problem, not just the proposed feature.
      placeholder: When I'm reconciling an invoice, I have to ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Anything you've tried or considered?
    validations:
      required: false

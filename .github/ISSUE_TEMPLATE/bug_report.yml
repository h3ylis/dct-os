name: Bug report
description: Report something that isn't working in DCT-OS
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. The more detail you give, the faster it gets fixed.
        Please don't paste real project, client, or commercially sensitive data.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what went wrong?
      placeholder: I clicked ... and instead of ... it ...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. See ...
    validations:
      required: false
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: DCT-OS version
      description: Shown in the app, or run `pip show dct-os`.
      placeholder: e.g. 1.1.0
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs, errors, or screenshots
      description: Paste any error text or drop a screenshot.
    validations:
      required: false
